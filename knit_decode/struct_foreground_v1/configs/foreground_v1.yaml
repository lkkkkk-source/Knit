data:
  train_manifest: outputs/manifests/inverse_rendering_train_frontonly.jsonl
  val_manifest: outputs/manifests/inverse_rendering_val_frontonly.jsonl
  cache_dir: knit_decode/struct_foreground_v1/cache/foreground_v1
  canonical_mode: full_masked
  canonical_size: 20
  background_class_id: 0
  ignore_index: -100

planner:
  num_modes_per_category: 16
  min_samples_per_mode: 20
  category_embed_dim: 256
  mode_embed_dim: 256
  hidden_dim: 384

clustering:
  label_spatial_feature_weight: 0.5
  label_spatial_area_norm_weight: 1.0
  label_spatial_channel_balanced_weight: 1.0
  label_transition_feature_weight: 0.75
  mask_feature_weight: 0.05
  row_col_feature_weight: 0.05
  bbox_feature_weight: 0.0
  label_mass_threshold: 0.1

grammar_bank:
  enabled: true
  motif_top_k: 200
  smoothing_alpha: 0.001
  tiny_component_threshold: 2
  min_mode_samples: 3
  occupancy_transition_condition_nonempty: true

nmf_dictionary:
  enabled: true
  inspect_only: true
  feature_mode: label_balanced_onehot
  dual_dictionary:
    enabled: true
    schema_version: foreground_v1_dictionary_fallback_v1
  dictionary_fallback:
    enabled: true
    default_strategy: dual_matched
    strategy_by_category:
      Cable1: dual_matched
      Cable2: dual_matched
      Tuck: dual_matched
      Miss: dual_matched
      Move2: dual_matched
      Links1: support_hist
      Links2: support_hist
      Hem: support_hist
      Mesh: occupancy_support
      Move1: transition_aware
  support_dictionary:
    feature_mode: fg_mask
    rank_same_as_label: true
    normalize_sample_area: false
    smooth:
      enabled: true
      kernel_size: 3
      strength: 0.25
    alpha_W: 0.0005
    alpha_H: 0.0005
    l1_ratio: 0.2
    prune:
      enabled: false
    gamma_fg: 1.0
    min_active_pixels: 8
  label_dictionary:
    feature_mode: label_balanced_onehot
    use_existing_balanced_config: true
    basis_unweight_after_fit: false
    alpha_W: 0.001
    alpha_H: 0.001
    l1_ratio: 0.5
    prune:
      enabled: false
  prior_fusion:
    fg_from: support_dictionary
    label_prob_from: label_dictionary
    label_mass_mask_from_support: true
    support_mass_threshold: 0.05
    label_confidence_threshold: 0.0
    normalize_label_prob: true
  category_adaptive:
    enabled: true
    use_category_stats: true
    min_effective_rank: 2
    min_effective_rank_ratio: 0.5
    max_collapsed_fraction_default: 0.5
    max_support_empty_basis_fraction: 0.5
    allow_low_label_entropy_if_category_low_entropy: true
    allow_low_diversity_if_category_low_diversity: true
  rank_default: 8
  rank_by_category:
    Cable1: 12
    Cable2: 12
    Move1: 12
    Move2: 12
    Hem: 12
    Mesh: 8
    Tuck: 8
    Links1: 4
    Links2: 4
    Miss: 6
  max_iter: 1000
  init: nndsvda
  solver: cd
  beta_loss: frobenius
  alpha_W: 0.001
  alpha_H: 0.001
  l1_ratio: 0.5
  random_state: 0
  eps: 1.0e-8
  prune_percentile: 0.0
  gamma_fg: 1.0
  save_basis_float16: false
  save_sample_codes: true
  inspect_sparse_top_r: 3
  label_balance:
    enabled: true
    mode: inverse_sqrt
    min_weight: 0.5
    max_weight: 12.0
    eps: 1.0e-6
  sample_normalize:
    enabled: true
    mode: area_sqrt
    eps: 1.0e-6
  channel_normalize:
    enabled: true
    mode: per_label_mass_sqrt
    eps: 1.0e-6
  basis_unweight_after_fit: false
  basis_normalize_mass_max: true
  sparsity:
    alpha_W: 0.001
    alpha_H: 0.001
    l1_ratio: 0.5
  prune:
    enabled: false
    percentile: 0
    min_value: 1.0e-8
  anti_collapse:
    enabled: true
    max_basis_dominant_ratio_warn: 0.90
    max_collapsed_basis_fraction_warn: 0.50
    min_mean_label_entropy_warn: 0.40
  category_overrides:
    Links1:
      support_dictionary:
        l1_ratio: 0.1
      anti_collapse:
        allow_single_label: true
      allow_low_label_entropy: true
      allow_high_label1_fraction: true
      min_effective_rank_ratio: 0.5
    Links2:
      support_dictionary:
        l1_ratio: 0.1
      anti_collapse:
        allow_single_label: true
      allow_low_label_entropy: true
      allow_high_label1_fraction: true
      min_effective_rank_ratio: 0.5
    Mesh:
      support_dictionary:
        l1_ratio: 0.1
        min_active_pixels: 4
      allow_fragmented_support: true
      min_effective_rank_ratio: 0.5
    Miss:
      support_dictionary:
        min_active_pixels: 2
      allow_sparse_support: true
      min_effective_rank_ratio: 0.5
  code_mode_count_default: 8
  code_mode_count_by_category:
    Cable1: 8
    Cable2: 8
    Move1: 8
    Move2: 8
    Hem: 8
    Mesh: 6
    Tuck: 6
    Links1: 4
    Links2: 4
    Miss: 4

instruction_matrix_grammar_prior:
  enabled: true
  schema_version: foreground_v1_instruction_matrix_grammar_prior_v1
  use_for_planner_smoke: true
  planner_prior:
    enabled: true
    label_prob_key: basis_label_prob_16
    mode_prior_key: mode_prior_smoothed
    fallback_if_missing: true
    fallback_source: category_kmeans
    sample_mode_strategy_train: sample
    sample_mode_strategy_eval: sample
    sample_mode_strategy_deterministic: top
    eps: 1.0e-8
  mode_count_default: 8
  mode_count_by_category:
    Cable1: 12
    Cable2: 12
    Hem: 8
    Links1: 4
    Links2: 4
    Mesh: 8
    Miss: 6
    Move1: 12
    Move2: 12
    Tuck: 8
  descriptor_weights:
    support: 0.5
    label_hist: 0.8
    transition: 1.2
    motif2: 1.2
    motif3: 0.6
    row_program: 1.0
    col_program: 1.0
    directional_shift: 1.5
    occupancy: 0.8
    component: 0.4
  motif2:
    enabled: true
    top_k: 128
    include_background: true
  motif3:
    enabled: true
    top_k: 128
    include_background: true
  row_program:
    enabled: true
    top_k: 128
    max_program_len: 20
  col_program:
    enabled: true
    top_k: 128
    max_program_len: 20
  directional_shift:
    enabled: true
    shift_clip: 3
    labels: all
    min_nonzero_shift_mass_for_move: 0.05
    min_abs_directional_asymmetry_for_move: 0.02
    min_shift_entropy_for_move: 0.05
    apply_to_categories:
      - Move1
      - Move2
      - Cable1
      - Cable2
  clustering:
    method: kmeans
    random_state: 0
    n_init: 10
    max_iter: 300
    min_samples_per_mode: 2
    reduce_modes_if_needed: true
    normalize_descriptor_blocks: true
  aggregation:
    fg_threshold: 0.05
    eps: 1.0e-8
    save_float16: false
  quality:
    min_effective_modes_default: 2
    min_effective_mode_fraction_default: 0.5
    min_mode_samples: 1
    min_mean_fg_area: 0.005
    max_empty_mode_fraction: 0.5
    max_label_collapse_fraction_default: 0.75
    require_directional_non_degenerate_for:
      - Move1
  calibration:
    enabled: true
    label_hist_interpolation:
      enabled: true
      alpha_default: 0.2
      alpha_by_category:
        Links1: 0.35
        Links2: 0.35
        Tuck: 0.25
        Cable1: 0.15
        Cable2: 0.15
        Move1: 0.15
        Move2: 0.15
        Mesh: 0.20
        Hem: 0.25
        Miss: 0.20
    mode_prior_smoothing:
      enabled: true
      beta_default: 1.0
      beta_by_category:
        Links1: 2.0
        Links2: 2.0
        Tuck: 2.0
    mode_pruning:
      enabled: false
      min_mode_usage_fraction: 0.01
      max_unused_fraction_warn: 0.5
      max_mode_fraction_warn: 0.8
      diagnostic_only: true
    mode_usage_cleanup:
      enabled: true
      diagnostic_only: true
      risk_categories:
        Cable1: true
        Links1: true
        Tuck: true
      suggested_mode_count_by_category:
        Cable1: null
        Links1: null
        Tuck: null
      max_mode_fraction_target: 0.8
      min_used_mode_fraction_target: 0.5
      allow_justified_unimodal_by_category:
        Links1: true
        Tuck: false
        Cable1: false
      mode_count_sweep:
        enabled: true
        candidates_by_category:
          Cable1: [6, 8, 10, 12]
          Links1: [1, 2, 3, 4]
          Tuck: [3, 4, 6, 8]
      alpha_sweep:
        enabled: true
        candidates_by_category:
          Cable1: [0.10, 0.15, 0.20, 0.25]
          Links1: [0.25, 0.35, 0.45, 0.55]
          Tuck: [0.15, 0.25, 0.35, 0.45]
      beta_sweep:
        enabled: true
        candidates_by_category:
          Cable1: [1.0, 2.0, 4.0]
          Links1: [2.0, 4.0, 8.0]
          Tuck: [2.0, 4.0, 8.0]
    save_raw_label_prob: true
    save_calibrated_label_prob: true
  evaluate_instruction_grammar_likelihood:
    use_calibrated_label_prob: true
    use_smoothed_mode_prior: true
  strategy_by_category:
    Cable1: grammar_modes
    Cable2: grammar_modes
    Hem: grammar_modes
    Links1: grammar_modes
    Links2: grammar_modes
    Mesh: grammar_modes
    Miss: grammar_modes
    Move1: grammar_modes_directional
    Move2: grammar_modes_directional
    Tuck: grammar_modes

grammar_rerank:
  enabled: false
  use_instruction_matrix_grammar_terms: false
  top_k: 8
  invalid_penalty: 999.0
  weights:
    area: 0.3
    conn: 0.4
    hist: 0.8
    rowcol: 0.3
    trans: 2.0
    occ_trans: 0.8
    motif: 2.0
    div: 2.0
    dom: 2.0
    single_label: 1.0
    graph: 0.0
    nmf: 0.0

train:
  output_dir: knit_decode/struct_foreground_v1/runs/foreground_planner_v1
  prior_source: instruction_matrix_grammar
  prior_mode_sampling: smoothed_prior
  prior_label_prob_key: basis_label_prob_16
  fallback_prior_source: category_kmeans
  use_instruction_grammar_prior: true
  max_steps_smoke: null
  epochs: 20
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  mask_dice_weight: 0.5
  mask_soft_iou_weight: 0.5
  centroid_label_weight: 0.05
  loss_weights:
    local_z: 1.0
    fg_mask: 1.0
    mask_dice: 0.5
    mask_soft_iou: 0.5
    fg_label: 1.0
    centroid_mask_weight: 0.05
    centroid_label: 0.05
    bbox: 1.0
    row_projection: 1.0
    col_projection: 1.0
    grammar_signature: 1.0
    adjacency: 1.0
  device: auto
  num_workers: 4
  pin_memory: false
  persistent_workers: false

sampling:
  device: auto
  prior_source: instruction_matrix_grammar
  prior_mode_sampling: smoothed_prior
  use_instruction_grammar_prior: true
  num_candidates: 64
  planner_oversample: 128
  num_valid_plans: 32

runs:
  smoke_output_dir: knit_decode/struct_foreground_v1/runs/foreground_planner_v1_instruction_grammar_smoke
