data:
  train_manifest: outputs/manifests/inverse_rendering_train.jsonl
  val_manifest: outputs/manifests/inverse_rendering_val.jsonl
  cache_dir: knit_decode/struct_foreground_v1/cache/foreground_v1
  canonical_mode: full_masked
  canonical_size: 20
  background_class_id: 0
  ignore_index: -100

planner:
  num_modes_per_category: 16
  min_samples_per_mode: 20
  category_embed_dim: 256
  mode_embed_dim: 256
  hidden_dim: 384

train:
  output_dir: knit_decode/struct_foreground_v1/runs/foreground_planner_v1
  epochs: 20
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss_weights:
    local_z: 1.0
    fg_mask: 1.0
    fg_label: 1.0
    bbox: 1.0
    row_projection: 1.0
    col_projection: 1.0
    grammar_signature: 1.0
    adjacency: 1.0
  device: cpu
  num_workers: 4
  pin_memory: false
  persistent_workers: false

sampling:
  num_candidates: 64
  planner_oversample: 128
  num_valid_plans: 32
